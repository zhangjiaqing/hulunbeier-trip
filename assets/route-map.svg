    <g transform="translate(735 520)">
      <circle r="12" fill="#15242b"/>
      <rect x="18" y="-39" width="180" height="70" rx="12" fill="#fff" stroke="#d9e2e7" filter="url(#shadow)"/>
      <text x="36" y="-14" fill="#17212b" font-size="22" font-weight="800">海拉尔</text>
      <text x="36" y="12" fill="#607080" font-size="15">D1 抵达 / D7 返程</text>
    </g>
    <g transform="translate(610 427)">
      <circle r="9" fill="#2c6f9f"/>
      <rect x="18" y="-34" width="162" height="63" rx="12" fill="#fff" stroke="#d9e2e7"/>
      <text x="34" y="-11" fill="#17212b" font-size="20" font-weight="800">莫日格勒河</text>
      <text x="34" y="13" fill="#607080" font-size="14">D2 草原曲水</text>
    </g>
    <g transform="translate(540 381)">
      <circle r="11" fill="#2c7a4b"/>
      <rect x="-176" y="-12" width="158" height="62" rx="12" fill="#fff" stroke="#d9e2e7"/>
      <text x="-159" y="12" fill="#17212b" font-size="20" font-weight="800">额尔古纳</text>
      <text x="-159" y="35" fill="#607080" font-size="14">D2 湿地日落</text>
    </g>
