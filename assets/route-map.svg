  <path d="M290 513 C252 548 218 578 188 614" fill="none" stroke="#b94f3c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <path d="M188 614 C302 671 542 662 735 520" fill="none" stroke="#b94f3c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>

