<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">呼伦贝尔家庭自驾 7 天 6 晚路线示意地图</title>
  <desc id="desc">路线从海拉尔出发，经过莫日格勒河、额尔古纳、白桦林、恩和或室韦、根河敖鲁古雅、黑山头、边防公路、满洲里、呼伦湖，最后回到海拉尔。</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5fbf4"/>
      <stop offset=".55" stop-color="#eef7f4"/>
      <stop offset="1" stop-color="#f8f3df"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d8efd9"/>
      <stop offset="1" stop-color="#edf8df"/>
    </linearGradient>
    <linearGradient id="forest" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#c9e5d3"/>
      <stop offset="1" stop-color="#a9d0bd"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#a8d9e9"/>
      <stop offset="1" stop-color="#6fb8d2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#264048" flood-opacity=".18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#b94f3c"/>
    </marker>
  </defs>

  <rect width="1200" height="760" rx="30" fill="url(#paper)"/>
  <path d="M79 97 C201 38 373 57 477 109 C601 171 678 141 800 99 C946 48 1051 89 1125 158 L1119 665 C1003 715 892 701 783 662 C647 613 556 639 421 689 C301 733 180 704 73 629 Z" fill="url(#grass)" stroke="#d4e2d0" stroke-width="2"/>
