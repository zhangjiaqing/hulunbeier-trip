  <path d="M120 519 C194 492 268 503 329 550 C386 594 411 648 391 704 C281 717 179 690 101 628 C78 592 88 544 120 519 Z" fill="url(#lake)" opacity=".82"/>
  <path d="M228 189 C301 234 396 243 470 293 C533 335 575 382 651 392 C733 403 807 359 870 319" fill="none" stroke="#83c5d7" stroke-width="10" stroke-linecap="round" opacity=".62"/>
  <path d="M226 189 C302 233 397 241 471 291 C535 334 575 381 651 391 C733 401 806 357 870 318" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity=".65"/>
