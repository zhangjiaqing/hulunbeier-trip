  <g transform="translate(62 58)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif">
    <rect width="368" height="116" rx="18" fill="#ffffff" stroke="#d9e2e7" filter="url(#shadow)"/>
    <text x="24" y="40" fill="#17212b" font-size="28" font-weight="850">呼伦贝尔自驾小环线</text>
    <text x="24" y="72" fill="#607080" font-size="16">海拉尔进出 · 7 天 6 晚 · 重点包含敖鲁古雅喂驯鹿</text>
    <text x="24" y="98" fill="#956237" font-size="14">示意图：用于行程理解，实际导航请以地图软件和实时路况为准。</text>
  </g>

  <g transform="translate(1000 610)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif">
    <circle cx="42" cy="42" r="38" fill="#ffffff" stroke="#d9e2e7"/>
    <path d="M42 13 L52 44 L42 37 L32 44 Z" fill="#15242b"/>
    <text x="36" y="67" fill="#15242b" font-size="16" font-weight="800">N</text>
