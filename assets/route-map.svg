  <text x="985" y="122" fill="#956237" font-size="20" font-weight="700">中俄边境方向</text>
  <text x="148" y="696" fill="#2b6f85" font-size="22" font-weight="800">呼伦湖</text>
  <text x="460" y="170" fill="#2d7650" font-size="18" font-weight="700" opacity=".9">大兴安岭森林带</text>
  <text x="706" y="363" fill="#2c6f9f" font-size="17" font-weight="700" opacity=".85">莫日格勒河</text>

