      <rect x="18" y="-37" width="155" height="64" rx="12" fill="#fff" stroke="#d9e2e7" filter="url(#shadow)"/>
      <text x="36" y="-13" fill="#17212b" font-size="20" font-weight="800">满洲里</text>
      <text x="36" y="11" fill="#607080" font-size="14">D6 城市夜景</text>
    </g>
    <g transform="translate(384 640)">
      <circle r="8" fill="#2c6f9f"/>
      <rect x="16" y="-31" width="116" height="54" rx="12" fill="#fff" stroke="#d9e2e7"/>
      <text x="31" y="-10" fill="#17212b" font-size="18" font-weight="800">呼伦湖</text>
      <text x="31" y="11" fill="#607080" font-size="13">D7 可选</text>
    </g>
