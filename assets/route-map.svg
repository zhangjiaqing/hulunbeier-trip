      <text x="-171" y="0" fill="#607080" font-size="14">D3 边境小镇</text>
    </g>
    <g transform="translate(575 202)">
      <circle r="11" fill="#2c7a4b"/>
      <rect x="20" y="-54" width="190" height="72" rx="12" fill="#fff" stroke="#d9e2e7" filter="url(#shadow)"/>
      <text x="38" y="-29" fill="#17212b" font-size="20" font-weight="800">根河 · 敖鲁古雅</text>
      <text x="38" y="-4" fill="#b94f3c" font-size="15" font-weight="800">D4 喂驯鹿</text>
    </g>
    <g transform="translate(290 513)">
      <circle r="10" fill="#b66a1a"/>
      <rect x="-174" y="-53" width="152" height="64" rx="12" fill="#fff" stroke="#d9e2e7"/>
      <text x="-157" y="-29" fill="#17212b" font-size="20" font-weight="800">黑山头</text>
      <text x="-157" y="-5" fill="#607080" font-size="14">D5 草原日落</text>
